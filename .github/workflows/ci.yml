name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-26.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install LLVM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm
      - name: Run tests
        run: make test
